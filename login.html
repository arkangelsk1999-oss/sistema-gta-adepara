<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Sistema GTA ADEPARÁ</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #1a5276; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }

.login-box {
  background: white; border-radius: 8px; padding: 40px;
  width: 100%; max-width: 400px; box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}

.cabecalho-login {
  text-align: center; margin-bottom: 28px;
}
.cabecalho-login .titulo-orgao {
  font-size: 13px; font-weight: bold; color: #1a5276; margin-bottom: 2px;
}
.cabecalho-login .subtitulo {
  font-size: 11px; color: #888;
}

.form-group { margin-bottom: 16px; }
label { display: block; font-size: 12px; color: #555; margin-bottom: 4px; font-weight: bold; }
input { width: 100%; padding: 10px 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
input:focus { outline: none; border-color: #1a5276; }

.btn-entrar {
  width: 100%; background: #1a5276; color: white; border: none;
  padding: 12px; border-radius: 4px; font-size: 15px; font-weight: bold;
  cursor: pointer; margin-top: 8px;
}
.btn-entrar:hover { background: #154360; }

.erro { background: #fadbd8; color: #c0392b; padding: 10px; border-radius: 4px; font-size: 13px; margin-bottom: 14px; }

.rodape-login {
  margin-top: 24px; text-align: center; font-size: 11px; color: #aaa;
}
.rodape-login img.ark { height: 28px; opacity: 0.5; margin-top: 8px; filter: invert(1); }

.adepara-logo { height: 40px; margin-top: 10px; }
</style>
</head>
<body>

<div class="login-box">
  <div class="cabecalho-login">
    <div class="titulo-orgao">AGÊNCIA DE DEFESA AGROPECUÁRIA DO ESTADO DO PARÁ</div>
    <img src="/adepara_logo.png" class="adepara-logo" alt="ADEPARÁ"
         onerror="this.style.display='none'">
    <div class="subtitulo" style="margin-top:12px;">Sistema de Consulta de GTAs</div>
  </div>

  {% if erro %}
  <div class="erro">{{ erro }}</div>
  {% endif %}

  <form method="POST">
    <div class="form-group">
      <label>E-mail de acesso</label>
      <input type="email" name="email" placeholder="seu@email.gov.br" required autofocus>
    </div>
    <div class="form-group">
      <label>Senha</label>
      <input type="password" name="senha" placeholder="••••••••" required>
    </div>
    <button type="submit" class="btn-entrar">Entrar</button>
  </form>

  <div class="rodape-login">
    Acesso restrito a usuários autorizados<br>
    <img src="/arkangelsk_logo.png" class="ark" alt="Arkangelsk"
         onerror="this.style.display='none'">
  </div>
</div>

</body>
</html>
